<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BASE-SIMPLE — API</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══ VARIABLES (Tetap sama) */
:root {
  --bg:#071510;--bg2:#0a1c16;--card:#0d2118;--card2:#102a1e;
  --fg:#c8ddd5;--fg2:#7aaa90;--fg3:#3d6650;
  --primary:#2dbd7e;--primary2:#1a9962;--accent:#2dbd7e;--red:#f87171;
  --border:rgba(45,189,126,0.08);--border2:rgba(45,189,126,0.16);
  --glow:0 0 40px rgba(45,189,126,0.18);--shadow:0 8px 32px rgba(0,0,0,0.5);
  --r:10px;
  --ff-mono:'Space Mono',monospace;--ff-disp:'Bebas Neue',sans-serif;--ff-body:'DM Sans',sans-serif;
  --j-key:#7eb3ff;--j-str:#a8e6a3;--j-num:#ffb86c;--j-bool:#f883d9;--j-null:#f87171;--j-punc:#3d6650;
}

/* ══ RESET & GLOBAL */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body {
  background: #000; /* Background luar hitam agar efek miring terlihat */
  color: var(--fg);
  font-family: var(--ff-body);
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 2000px; /* Penting untuk efek 3D */
}

/* ══ WRAPPER UTAMA (Efek Miring) */
.device-container {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-style: preserve-3d;
  position: relative;
}

/* EFEK MIRING: Aktif di Laptop ATAU HP pas Landscape */
@media (min-width: 1024px), (orientation: landscape) {
  .device-container {
    width: 90%;
    max-height: 90vh;
    border-radius: 24px;
    border: 1px solid var(--border2);
    transform: rotateY(-12deg) rotateX(5deg) rotateZ(1deg);
    box-shadow: -40px 40px 80px rgba(0,0,0,0.8), 
                0 0 0 10px rgba(255,255,255,0.02);
    overflow-y: auto;
  }
}

/* ══ ERROR HANDLING (404/500) */
.error-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  text-align: center;
}
.error-screen h1 { font-family: var(--ff-disp); font-size: 120px; color: var(--red); line-height: 1; }
.error-screen p { font-family: var(--ff-mono); font-size: 12px; color: var(--fg3); margin-bottom: 20px; }
.btn-back { 
  background: var(--card2); border: 1px solid var(--red); color: var(--red);
  padding: 8px 20px; border-radius: 8px; font-family: var(--ff-mono); cursor: pointer;
}

/* ══ STYLE ORI (Sisanya tetap sama dengan kodemu) */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(45,189,126,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,189,126,0.03) 1px,transparent 1px);background-size:48px 48px;}
header{position:sticky;top:0;z-index:200;background:rgba(7,21,16,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border2);}
.header-inner{max-width:900px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--ff-mono);font-size:13px;font-weight:700;color:var(--fg);text-decoration:none;display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;background:var(--primary);border-radius:50%;}
.main-wrap{max-width:900px;margin:0 auto;padding:20px;position:relative;z-index:10;}
.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.ep-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;margin:10px;cursor:pointer;}
.badge{font-family:var(--ff-mono);font-size:8px;padding:3px 9px;border-radius:6px;}
.badge-get{background:rgba(45,189,126,0.1);color:var(--primary);border:1px solid var(--border2);}

/* Loader */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
#loader.out{opacity:0;visibility:hidden;transition:0.5s;}

</style>
</head>
<body>

<div id="loader">
  <div style="width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--primary);border-radius:50%;animation:spin .9s linear infinite;"></div>
</div>

<div class="device-container" id="mainContainer">
  <div class="grid-bg"></div>

  <header>
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-dot"></div> BASE-SIMPLE <span style="background:var(--primary2);padding:2px 6px;border-radius:4px;font-size:9px;">API</span>
      </a>
      <div style="font-size:9px;color:var(--fg3);font-family:var(--ff-mono)">@oota_asik_sendiri</div>
    </div>
  </header>

  <div class="main-wrap">
    <div id="ep-list"></div>

    <div id="error-view" class="error-screen">
        <h1 id="err-code">404</h1>
        <p id="err-msg">Terjadi kesalahan pada sistem.</p>
        <button class="btn-back" onclick="location.reload()">REFRESH PAGE</button>
    </div>
  </div>
</div>

<script>
// Logic Load Data & Error Handling
async function loadAndRender() {
  const listEl = document.getElementById('ep-list');
  const errorView = document.getElementById('error-view');
  
  try {
    const response = await fetch('/endpoint');
    
    // Simulasi Error 500 jika gagal fetch
    if (!response.ok) {
        throw { code: response.status, msg: "Server Gagal Merespon" };
    }
    
    const data = await response.json();
    renderData(data.endpoints || data);

  } catch (err) {
    listEl.style.display = 'none';
    errorView.style.display = 'flex';
    document.getElementById('err-code').textContent = err.code || '500';
    document.getElementById('err-msg').textContent = err.msg || 'Terputus dari server. Periksa koneksi Anda.';
  }
}

function renderData(apiData) {
  const listEl = document.getElementById('ep-list');
  apiData.forEach((cat, ci) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div style="padding:15px;font-family:var(--ff-mono);font-size:10px;color:var(--fg3);text-transform:uppercase;">${cat.name}</div>`;
    
    cat.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'ep-row';
      row.innerHTML = `
        <span class="badge badge-get">${item.post ? 'POST' : 'GET'}</span>
        <span style="font-family:var(--ff-mono);font-size:11px;flex:1;">${item.path}</span>
        <span style="color:var(--fg3)">›</span>
      `;
      card.appendChild(row);
    });
    listEl.appendChild(card);
  });
}

// Menjalankan Loader & Fetch
window.addEventListener('DOMContentLoaded', () => {
  loadAndRender();
  setTimeout(() => {
    document.getElementById('loader').classList.add('out');
  }, 1000);
});

// Tambahan CSS Animation
const style = document.createElement('style');
style.textContent = `@keyframes spin{to{transform:rotate(360deg)}}`;
document.head.appendChild(style);
</script>
</body>
</html>
